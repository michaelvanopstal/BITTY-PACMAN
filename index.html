<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Bitty Pacman Demo</title>
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at top, #222 0, #000 60%);
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .wrapper {
      text-align: center;
    }

#hudOverlay {
  position: fixed;
  inset: 0;                 /* hele scherm */
  pointer-events: none;     /* game blijft klikbaar */
  z-index: 3000;            /* boven alles */
}

.hud-left {
  position: absolute;
  top: 20px;
  left: 20px;
  font-size: 22px;
  font-family: "Courier New", monospace;
  color: #fff;
  text-shadow: 0 0 6px rgba(0,0,0,0.8);
}


   .game-container canvas {
  display: block;
  border-radius: 0;
  box-shadow: none;
  background: transparent;
}



    /* 
      STAP 7: HTML GAME-OVER OVERLAY PERMANENT UIT  
      We laten message/messageText bestaan (game.js gebruikt ze),
      maar zorgen dat ze *nooit zichtbaar worden*. 
    */
    .message {
      display: none !important;
    }

    .sub {
      margin-top: 10px;
      font-size: 14px;
      opacity: 0.8;
    }
  </style>

</head>
<body>

  <!-- HUD OVERLAY (los van de maze, over hele scherm) -->
  <div id="hudOverlay">
    <div class="hud-left">
      <span>Score: <span id="score">0</span></span>
      <span style="margin-left: 20px;">
        Lives: <span id="lives">3</span>
      </span>
    </div>
  </div>

  <!-- GAME WRAPPER -->
  <div class="wrapper">
    <h1>Bitty Pacman</h1>

    <div
      class="game-container"
      style="position: relative; width: 900px; height: 900px;"
    >

      <!-- Achtergrond PNG-maze -->
      <canvas
        id="mazeCanvas"
        width="900"
        height="900"
        style="position: absolute; left: 0; top: 0;"
      ></canvas>

      <!-- Spel (stippen, Bitty, ghosts) -->
      <canvas
        id="gameCanvas"
        width="900"
        height="900"
        style="position: absolute; left: 0; top: 0;"
      ></canvas>

      <!-- HTML overlay (blijft bestaan maar is onzichtbaar) -->
      <div id="message" class="message hidden">
        <div id="messageText"></div>
        <div class="sub">Press SPACE to play again</div>
      </div>

    </div>

    <p class="hint">
      Use the arrow keys to move Bitty. Avoid the ghost!
    </p>
  </div>

  <script src="game.js"></script>

</body>


   <!-- Zwevend Bitty-plaatje -->
    <img
      src="bitty_mascot.png"
      alt="Bitty mascot"
      class="floating-bitty"
    >
  <!-- GAME LOGIC -->
  <script src="game.js"></script>

</body>
</html>
