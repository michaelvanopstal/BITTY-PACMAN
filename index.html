<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Bitty Pacman Demo</title>

    <link rel="stylesheet" href="style.css" />

    <style>
      body {
        margin: 0;
        padding: 0;
        background: radial-gradient(circle at top, #222 0, #000 60%);
        color: #fff;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      /* canvassen binnen de game-container */
      .game-container canvas {
        display: block;
        border-radius: 0;
        box-shadow: none;
      }

      /* HTML message blijft bestaan maar is altijd onzichtbaar */
      .message {
        display: none !important;
      }

      .sub {
        margin-top: 10px;
        font-size: 14px;
        opacity: 0.8;
      }

      /* VASTE GAME VIEWPORT (geen scroll) */
      #gameWrapper {
        position: fixed;
        inset: 0;
        overflow: hidden;
        background: transparent;
      }

      #gameViewport {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
      }
    </style>
  </head>

  <body>
    <!-- GAME WRAPPER -->
    <div id="gameWrapper">

      <!-- Gecentreerde game -->
      <div id="gameViewport">
        <div
          class="game-container"
          style="position: relative; width: 900px; height: 900px;"
        >
          <!-- Achtergrond PNG-maze -->
          <canvas
            id="mazeCanvas"
            width="900"
            height="900"
            style="position: absolute; left: 0; top: 0;"
          ></canvas>

          <!-- Spel (stippen, Bitty, ghost) -->
          <canvas
            id="gameCanvas"
            width="900"
            height="900"
            style="position: absolute; left: 0; top: 0;"
          ></canvas>

          <!-- HTML overlay (onzichtbaar) -->
          <div id="message" class="message hidden">
            <div id="messageText"></div>
            <div class="sub">Press SPACE to play again</div>
          </div>
        </div>
      </div>
    </div>

    <!-- FULLSCREEN HUD CANVAS -->
    <canvas id="hudCanvas"></canvas>

    <!-- GAME LOGIC -->
    <script src="game.js"></script>
  </body>
</html>
