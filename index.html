<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Bitty Pacman Demo</title>

  <!-- Externe CSS -->
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at top, #222 0, #000 60%);
      color: #fff;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    /* ✅ VASTE GAME WRAPPER (fullscreen, geen scroll) */
    #gameWrapper {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: transparent;
    }

    /* ✅ GECENTREERDE GAME VIEWPORT */
    #gameViewport {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }

    /* canvassen binnen de game-container */
    .game-container {
      position: relative;
      width: 900px;
      height: 900px;
    }

    .game-container canvas {
      position: absolute;
      left: 0;
      top: 0;
      display: block;
      border-radius: 0;
      box-shadow: none;
      background: transparent;
    }

    /* HTML message bestaat nog maar is altijd onzichtbaar */
    .message {
      display: none !important;
    }
  </style>
</head>

<body>

  <!-- ✅ GAME WRAPPER -->
  <div id="gameWrapper">

    <!-- 🎮 GAME VIEWPORT -->
    <div id="gameViewport">
      <div class="game-container">

        <!-- Achtergrond PNG-maze -->
        <canvas id="mazeCanvas" width="900" height="900"></canvas>

        <!-- Spel (dots, Bitty, ghosts) -->
        <canvas id="gameCanvas" width="900" height="900"></canvas>

        <!-- HTML overlay (niet gebruikt, maar veilig behouden) -->
        <div id="message" class="message hidden">
          <div id="messageText"></div>
          <div class="sub">Press SPACE to play again</div>
        </div>

      </div>
    </div>

  </div>

  <!-- ✅ FULLSCREEN HUD CANVAS (score, lives, titel, highscore) -->
  <canvas id="hudCanvas"></canvas>

  <!-- 🐱 Zwevend Bitty-plaatje (mag blijven) -->
  <img
    src="bitty_mascot.png"
    alt="Bitty mascot"
    class="floating-bitty"
  >

  <!-- GAME LOGIC -->
  <script src="game.js"></script>

</body>
</html>
