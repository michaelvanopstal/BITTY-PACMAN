<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Bitty Pacman</title>

    <link rel="stylesheet" href="style.css" />

    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      /* UI rechtsboven */
      .wrapper {
        position: fixed; /* vast op scherm */
        right: 40px;
        top: 40px;
        text-align: right;
        z-index: 1000;
        background: transparent;
      }

      .hud {
        display: flex;
        justify-content: flex-end;
        gap: 40px;
        font-size: 20px;
        margin-bottom: 10px;
      }

      /* canvassen binnen de game-container */
      .game-container canvas {
        display: block;
        border-radius: 0;
        box-shadow: none;
      }

      /* HTML message blijft bestaan maar is altijd onzichtbaar */
      .message {
        display: none !important;
      }

      .sub {
        margin-top: 10px;
        font-size: 14px;
        opacity: 0.8;
      }

      /* VASTE GAME VIEWPORT (geen scroll) */
      #gameWrapper {
        position: fixed;
        inset: 0;
        overflow: hidden;
        background: transparent;
      }

      #gameViewport {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
      }
    </style>
  </head>

  <body>
    <!-- GAME WRAPPER (vaste viewport, geen scroll) -->
    <div id="gameWrapper">
      <!-- UI rechtsboven -->
      <div class="wrapper">
        <h1>Bitty Pacman</h1>

        <div class="hud">
          <span>Score: <span id="score">0</span></span>
          <span>Lives: <span id="lives">3</span></span>
        </div>

        <p class="hint">Use the arrow keys to move Bitty. Avoid the ghost!</p>
      </div>

      <!-- Gecentreerde game -->
      <div id="gameViewport">
        <div class="game-container" style="position: relative; width: 900px; height: 900px;">
          <!-- Achtergrond PNG-maze -->
          <canvas
            id="mazeCanvas"
            width="900"
            height="900"
            style="position: absolute; left: 0; top: 0;"
          ></canvas>

          <!-- Spel (stippen, Bitty, ghost) -->
          <canvas
            id="gameCanvas"
            width="900"
            height="900"
            style="position: absolute; left: 0; top: 0;"
          ></canvas>

          <!-- HTML overlay blijft bestaan maar is permanent onzichtbaar -->
          <div id="message" class="message hidden">
            <div id="messageText"></div>
            <div class="sub">Press SPACE to play again</div>
          </div>
        </div>
      </div>
    </div>

    <!-- FULLSCREEN HUD CANVAS (blijft altijd vast) -->
    <canvas id="hudCanvas"></canvas>

    <!-- Zwevend Bitty-plaatje -->
    <img src="bitty_mascot.png" alt="Bitty mascot" class="floating-bitty" />

    <!-- GAME LOGIC -->
    <script src="game.js"></script>
  </body>
</html>
