<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Bitty Pacman Demo</title>

  <!-- jouw eigen stylesheet -->
  <link rel="stylesheet" href="style.css" />

  <style>
    /* een beetje basis, mocht style.css leeg zijn */
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    #hud {
      padding-top: 10px;
      font-size: 20px;
    }

    #gameWrapper {
      position: relative;
      display: inline-block;
      margin-top: 10px;
    }

    /* mazeCanvas onder gameCanvas (maze = achtergrond) */
    #mazeCanvas, #gameCanvas {
      display: block;
      position: absolute;
      left: 0;
      top: 0;
    }

    #mazeCanvas {
      z-index: 0;
    }

    #gameCanvas {
      z-index: 1;
    }

    /* Game-over / message overlay */
    #message {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.8);
      padding: 20px 40px;
      border-radius: 10px;
      font-size: 28px;
      z-index: 5;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>

  <div id="hud">
    <span>Score: <span id="score">0</span></span>
    &nbsp;&nbsp;&nbsp;
    <span>Lives: <span id="lives">3</span></span>
  </div>

  <div id="gameWrapper">
    <!-- achtergrond maze -->
    <canvas id="mazeCanvas"></canvas>
    <!-- alles wat beweegt (pacman, ghosts, dots, electric etc.) -->
    <canvas id="gameCanvas"></canvas>

    <!-- overlay voor Game Over / messages -->
    <div id="message" class="hidden">
      <span id="messageText">Game Over</span><br/>
      <small>Press SPACE to start again</small>
    </div>
  </div>

  <!-- jouw game-code -->
  <script src="game.js"></script>
</body>
</html>
