<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <title>Bitty Pacman</title>
  <style>
    body {
      margin: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #fff;
      font-family: Arial, sans-serif;
    }

    canvas {
      /* Grootte is GRID (19 x 23 tiles van 24px) */
      background: #000;
      border: 2px solid #444;
      image-rendering: pixelated;
      /* Als je jouw BITTY-level als plaatje wilt:
         vervang de volgende regel door bijv:
         background: url('bitty_level.png') no-repeat center/cover black;
      */
    }

    #hud {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 40px;
      font-size: 18px;
      text-shadow: 0 0 4px #000;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="score">Score: 0</div>
    <div id="lives">Lives: 3</div>
    <div id="time">Time: 0.0s</div>
  </div>
  <canvas id="game" width="456" height="552"></canvas>

  <script>
    // -----------------------
    // Basis instellingen
    // -----------------------
    const TILE_SIZE = 24;
    const COLS = 19;
    const ROWS = 23;

    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const scoreEl = document.getElementById("score");
    const livesEl = document.getElementById("lives");
    const timeEl = document.getElementById("time");

    // Tile legend:
    // # = muur
    // . = kleine stip
    // o = grote stip (power)
    // G = deur ghost-house
    // H = centrum ghost-house (spawn)
    // ' ' = leeg pad
    const levelRows = [
      "###################", // 0
      "#.................#", // 1
      "#.###.###.###.###.#", // 2
      "#o#.#.#.#.#.#.#.#o#", // 3
      "#.###.###.###.###.#", // 4
      "#........#........#", // 5
      "###.#####.#.#####.#", // 6
      "###.#   G   #.###.#", // 7
      "#...# ##### #...#.#", // 8
      "#.###   H   ###.#.#", // 9
      "#........#........#", //10
      "#.###.###.#.###.###", //11
      "#o..#.....#.....#o#", //12
      "###.#.###.#.###.#.#", //13
      "#...#.#.......#.#.#", //14
      "#.###.#.#####.#.###", //15
      "#........#........#", //16
      "#.###.###.###.###.#", //17
      "#o#.#.#.#.#.#.#.#o#", //18
      "#.###.###.###.###.#", //19
      "#.................#", //20
      "###################", //21
      "###################"  //22
    ];

    // -----------------------
    // Spelstatus
    // -----------------------
    let score = 0;
    let lives = 3;
    let elapsedTime = 0;
    let gameOver = false;

    // power mode
    let powerTimer = 0;
    const POWER_DURATION = 10; // seconden
    let ghostEatMultiplier = 1; // 1,2,4,8 → 200,400,800,1600

    // helpers
    const DIR = {
      NONE: { x: 0, y: 0 },
      LEFT: { x: -1, y: 0 },
      RIGHT: { x: 1, y: 0 },
      UP: { x: 0, y: -1 },
      DOWN: { x: 0, y: 1 }
    };

    function cloneDir(d) {
      return { x: d.x, y: d.y };
    }

    // -----------------------
    // Maze data
    // -----------------------
    const pellets = [];      // kleine stippen
    const powerPellets = []; // grote stippen
    let ghostHouseCenter = null;
    let ghostGateTile = null;

    function initLevelData() {
      for (let row = 0; row < ROWS; row++) {
        for (let col = 0; col < COLS; col++) {
          const ch = levelRows[row][col];
          const x = col * TILE_SIZE + TILE_SIZE / 2;
          const y = row * TILE_SIZE + TILE_SIZE / 2;

          if (ch === ".") {
            pellets.push({ col, row, x, y, eaten: false });
          } else if (ch === "o") {
            powerPellets.push({ col, row, x, y, eaten: false });
          } else if (ch === "H") {
            ghostHouseCenter = { col, row, x, y };
          } else if (ch === "G") {
            ghostGateTile = { col, row };
          }
        }
      }
    }

    function tileAt(col, row) {
      if (row < 0 || row >= ROWS || col < 0 || col >= COLS) return "#";
      return levelRows[row][col];
    }

    function isWallFor(entity, col, row) {
      const ch = tileAt(col, row);
      if (ch === "#") return true;
      if (ch === "G" && entity.type === "pacman") return true; // deur blokkeert pacman
      return false;
    }

    function hitsWall(entity, nx, ny) {
      const r = entity.radius - 2;
      const points = [
        { x: nx - r, y: ny - r },
        { x: nx + r, y: ny - r },
        { x: nx - r, y: ny + r },
        { x: nx + r, y: ny + r }
      ];
      for (const p of points) {
        const col = Math.floor(p.x / TILE_SIZE);
        const row = Math.floor(p.y / TILE_SIZE);
        if (isWallFor(entity, col, row)) {
          return true;
        }
      }
      return false;
    }

    // -----------------------
    // Pacman
    // -----------------------
    const pacman = {
      type: "pacman",
      x: 0,
      y: 0,
      radius: 9,
      speed: 90, // px per sec
      dir: cloneDir(DIR.LEFT),
      nextDir: cloneDir(DIR.LEFT),
      mouthAngle: 0,
      mouthSpeed: 5,
      alive: true
    };

    function resetPacman() {
      // startpositie: onderaan midden (rij 20, kolom 9)
      const startRow = 20;
      const startCol = 9;
      pacman.x = startCol * TILE_SIZE + TILE_SIZE / 2;
      pacman.y = startRow * TILE_SIZE + TILE_SIZE / 2;
      pacman.dir = cloneDir(DIR.LEFT);
      pacman.nextDir = cloneDir(DIR.LEFT);
    }

    function movePacman(dt) {
      if (!pacman.alive) return;

      // probeer eerst gewenste richting
      if (pacman.nextDir.x !== pacman.dir.x || pacman.nextDir.y !== pacman.dir.y) {
        const testNx =
          pacman.x + pacman.nextDir.x * pacman.speed * dt;
        const testNy =
          pacman.y + pacman.nextDir.y * pacman.speed * dt;
        if (!hitsWall(pacman, testNx, testNy)) {
          pacman.dir = cloneDir(pacman.nextDir);
        }
      }

      const nx = pacman.x + pacman.dir.x * pacman.speed * dt;
      const ny = pacman.y + pacman.dir.y * pacman.speed * dt;
      if (!hitsWall(pacman, nx, ny)) {
        pacman.x = nx;
        pacman.y = ny;
      }

      // mond-animatie
      pacman.mouthAngle += pacman.mouthSpeed * dt;
    }

    function drawPacman() {
      const angle = (Math.sin(pacman.mouthAngle) * 0.4 + 0.6) * Math.PI / 4;
      let startAngle = 0;
      let endAngle = 0;
      if (pacman.dir.x === 1) {
        startAngle = angle;
        endAngle = 2 * Math.PI - angle;
      } else if (pacman.dir.x === -1) {
        startAngle = Math.PI + angle;
        endAngle = Math.PI - angle;
      } else if (pacman.dir.y === -1) {
        startAngle = -Math.PI / 2 + angle;
        endAngle = -Math.PI / 2 - angle;
      } else if (pacman.dir.y === 1) {
        startAngle = Math.PI / 2 + angle;
        endAngle = Math.PI / 2 - angle;
      } else {
        startAngle = 0;
        endAngle = 2 * Math.PI;
      }

      ctx.fillStyle = "#ffeb3b";
      ctx.beginPath();
      ctx.moveTo(pacman.x, pacman.y);
      ctx.arc(pacman.x, pacman.y, pacman.radius, startAngle, endAngle, false);
      ctx.closePath();
      ctx.fill();
    }

    // -----------------------
    // Ghosts
    // -----------------------
    const ghosts = [];

    function createGhost(color, releaseDelay) {
      const g = {
        type: "ghost",
        x: ghostHouseCenter.x,
        y: ghostHouseCenter.y,
        radius: 9,
        speed: 80,
        color,
        dir: cloneDir(DIR.UP),
        mode: "home",   // home, leaving, chase, frightened, eyes
        releaseDelay,   // tijd in seconden voor hij de deur uit mag
        frightenedFlash: false
      };
      ghosts.push(g);
    }

    function initGhosts() {
      ghosts.length = 0;
      createGhost("#ff0000", 0); // Blinky
      createGhost("#ffb8ff", 3); // Pinky
      createGhost("#00ffff", 6); // Inky
      createGhost("#ffa500", 9); // Clyde
    }

    function getTileFromPos(x, y) {
      return {
        col: Math.floor(x / TILE_SIZE),
        row: Math.floor(y / TILE_SIZE)
      };
    }

    function availableDirectionsForGhost(g) {
      const dirs = [DIR.LEFT, DIR.RIGHT, DIR.UP, DIR.DOWN];
      const currentOpposite = { x: -g.dir.x, y: -g.dir.y };
      const result = [];
      for (const d of dirs) {
        const col = Math.floor((g.x + d.x * TILE_SIZE / 2) / TILE_SIZE);
        const row = Math.floor((g.y + d.y * TILE_SIZE / 2) / TILE_SIZE);
        const ch = tileAt(col, row);
        if (ch === "#") continue;
        // deur is alleen toegankelijk in leaving/eyes
        if (ch === "G" && !(g.mode === "leaving" || g.mode === "eyes")) continue;
        // niet direct omkeren behalve als vast
        if (d.x === currentOpposite.x && d.y === currentOpposite.y) continue;
        result.push(d);
      }
      // als geen opties (bijv. doodlopend), mag wel omkeren
      if (result.length === 0) {
        for (const d of dirs) {
          const col = Math.floor((g.x + d.x * TILE_SIZE / 2) / TILE_SIZE);
          const row = Math.floor((g.y + d.y * TILE_SIZE / 2) / TILE_SIZE);
          const ch = tileAt(col, row);
          if (ch !== "#") result.push(d);
        }
      }
      return result;
    }

    function chooseDirectionChase(g) {
      // simpele AI: kies richting die Pacman het dichtst nadert
      const dirs = availableDirectionsForGhost(g);
      if (dirs.length === 0) return;
      const target = getTileFromPos(pacman.x, pacman.y);
      let best = dirs[0];
      let bestDist = Infinity;
      for (const d of dirs) {
        const col = Math.floor((g.x + d.x * TILE_SIZE) / TILE_SIZE);
        const row = Math.floor((g.y + d.y * TILE_SIZE) / TILE_SIZE);
        const dx = col - target.col;
        const dy = row - target.row;
        const dist = dx * dx + dy * dy;
        if (dist < bestDist) {
          bestDist = dist;
          best = d;
        }
      }
      g.dir = cloneDir(best);
    }

    function chooseDirectionEyes(g) {
      // probeer terug naar ghostHouseCenter te gaan
      const dirs = availableDirectionsForGhost(g);
      if (dirs.length === 0) return;
      const target = ghostHouseCenter;
      let best = dirs[0];
      let bestDist = Infinity;
      for (const d of dirs) {
        const col = Math.floor((g.x + d.x * TILE_SIZE) / TILE_SIZE);
        const row = Math.floor((g.y + d.y * TILE_SIZE) / TILE_SIZE);
        const dx = col - target.col;
        const dy = row - target.row;
        const dist = dx * dx + dy * dy;
        if (dist < bestDist) {
          bestDist = dist;
          best = d;
        }
      }
      g.dir = cloneDir(best);
    }

    function moveGhost(g, dt, currentTime) {
      // vrijlaten uit ghost house
      if (g.mode === "home" && currentTime >= g.releaseDelay) {
        g.mode = "leaving";
        g.dir = cloneDir(DIR.UP); // omhoog naar deur
      }

      // speciale logica per mode
      if (g.mode === "leaving") {
        // als hij door de deur is, wordt het chase
        const tile = getTileFromPos(g.x, g.y);
        if (tile.row < ghostGateTile.row) {
          g.mode = "chase";
        }
      }

      // kies richting op kruising
      const tileCenterX =
        Math.floor(g.x / TILE_SIZE) * TILE_SIZE + TILE_SIZE / 2;
      const tileCenterY =
        Math.floor(g.y / TILE_SIZE) * TILE_SIZE + TILE_SIZE / 2;
      const closeToCenter =
        Math.abs(g.x - tileCenterX) < 1 && Math.abs(g.y - tileCenterY) < 1;

      if (closeToCenter) {
        if (g.mode === "chase") {
          chooseDirectionChase(g);
        } else if (g.mode === "eyes") {
          chooseDirectionEyes(g);
        } else if (g.mode === "frightened") {
          // random op kruising
          const dirs = availableDirectionsForGhost(g);
          if (dirs.length > 0) {
            g.dir = cloneDir(dirs[Math.floor(Math.random() * dirs.length)]);
          }
        }
      }

      const speed =
        g.mode === "frightened" ? g.speed * 0.65 :
        g.mode === "eyes" ? g.speed * 1.3 :
        g.speed;

      const nx = g.x + g.dir.x * speed * dt;
      const ny = g.y + g.dir.y * speed * dt;

      const fakeEntity = { ...g, radius: g.radius, type: "ghost" };
      if (!hitsWall(fakeEntity, nx, ny)) {
        g.x = nx;
        g.y = ny;
      } else {
        // als geblokkeerd, kies andere richting
        const dirs = availableDirectionsForGhost(g);
        if (dirs.length > 0) {
          g.dir = cloneDir(dirs[Math.floor(Math.random() * dirs.length)]);
        }
      }

      // check of ogen weer in het huis zijn
      if (g.mode === "eyes") {
        const t = getTileFromPos(g.x, g.y);
        if (t.col === ghostHouseCenter.col && t.row === ghostHouseCenter.row) {
          g.mode = "home";
          g.dir = cloneDir(DIR.UP);
        }
      }
    }

    function drawGhost(g) {
      let color = g.color;
      if (g.mode === "frightened") {
        // knipperen: blauw / wit
        color = g.frightenedFlash ? "#ffffff" : "#0000ff";
      } else if (g.mode === "eyes") {
        color = "#ffffff";
      }

      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(g.x, g.y, g.radius, Math.PI, 0);
      ctx.lineTo(g.x + g.radius, g.y + g.radius);
      ctx.lineTo(g.x - g.radius, g.y + g.radius);
      ctx.closePath();
      ctx.fill();

      // ogen
      ctx.fillStyle = "#000";
      if (g.mode === "eyes" || g.mode === "chase" || g.mode === "home" || g.mode === "leaving") {
        const eyeOffsetX = g.dir.x * 2;
        const eyeOffsetY = g.dir.y * 2;
        ctx.beginPath();
        ctx.arc(g.x - 4, g.y - 2, 2, 0, 2 * Math.PI);
        ctx.arc(g.x + 4, g.y - 2, 2, 0, 2 * Math.PI);
        ctx.fillStyle = "#fff";
        ctx.fill();
        ctx.beginPath();
        ctx.arc(g.x - 4 + eyeOffsetX, g.y - 2 + eyeOffsetY, 1, 0, 2 * Math.PI);
        ctx.arc(g.x + 4 + eyeOffsetX, g.y - 2 + eyeOffsetY, 1, 0, 2 * Math.PI);
        ctx.fillStyle = "#0000ff";
        ctx.fill();
      }
    }

    // -----------------------
    // Stippen & power-ups
    // -----------------------
    function handlePelletEating() {
      // kleine stip
      for (const p of pellets) {
        if (p.eaten) continue;
        const dx = pacman.x - p.x;
        const dy = pacman.y - p.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < pacman.radius + 3) {
          p.eaten = true;
          score += 10; // kleine stip = 10 punten
        }
      }

      // grote stip
      for (const p of powerPellets) {
        if (p.eaten) continue;
        const dx = pacman.x - p.x;
        const dy = pacman.y - p.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < pacman.radius + 3) {
          p.eaten = true;
          activatePowerMode();
        }
      }
    }

    function activatePowerMode() {
      powerTimer = POWER_DURATION;
      ghostEatMultiplier = 1;
      ghosts.forEach(g => {
        if (g.mode === "chase" || g.mode === "home" || g.mode === "leaving") {
          g.mode = "frightened";
        }
      });
    }

    function drawPellets() {
      ctx.fillStyle = "#ffffff";
      for (const p of pellets) {
        if (p.eaten) continue;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 2, 0, 2 * Math.PI);
        ctx.fill();
      }

      ctx.fillStyle = "#ffffff";
      for (const p of powerPellets) {
        if (p.eaten) continue;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 5, 0, 2 * Math.PI);
        ctx.fill();
      }
    }

    // -----------------------
    // Muren tekenen
    // -----------------------
    function drawMaze() {
      for (let row = 0; row < ROWS; row++) {
        for (let col = 0; col < COLS; col++) {
          const ch = levelRows[row][col];
          if (ch === "#") {
            ctx.strokeStyle = "#0000ff";
            ctx.lineWidth = 4;
            const x = col * TILE_SIZE;
            const y = row * TILE_SIZE;
            ctx.strokeRect(
              x + 2,
              y + 2,
              TILE_SIZE - 4,
              TILE_SIZE - 4
            );
          }
          if (ch === "G") {
            // witte deur
            ctx.strokeStyle = "#ffffff";
            ctx.lineWidth = 2;
            const x = col * TILE_SIZE;
            const y = row * TILE_SIZE + TILE_SIZE / 2;
            ctx.beginPath();
            ctx.moveTo(x + 4, y);
            ctx.lineTo(x + TILE_SIZE - 4, y);
            ctx.stroke();
          }
        }
      }
    }

    // -----------------------
    // Botsingen Pacman ↔ Ghost
    // -----------------------
    function handleGhostCollisions() {
      for (const g of ghosts) {
        const dx = pacman.x - g.x;
        const dy = pacman.y - g.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < pacman.radius + g.radius - 2) {
          if (g.mode === "frightened") {
            // spookje opgegeten
            const points = 200 * ghostEatMultiplier;
            score += points;
            ghostEatMultiplier = Math.min(ghostEatMultiplier * 2, 8);
            g.mode = "eyes";
          } else if (g.mode !== "eyes") {
            // Pacman geraakt
            loseLife();
            return;
          }
        }
      }
    }

    function loseLife() {
      lives--;
      if (lives <= 0) {
        gameOver = true;
        return;
      }
      // reset posities
      resetPacman();
      initGhosts();
      powerTimer = 0;
      ghostEatMultiplier = 1;
    }

    // -----------------------
    // Input
    // -----------------------
    window.addEventListener("keydown", (e) => {
      if (gameOver) return;
      switch (e.key) {
        case "ArrowLeft":
        case "a":
        case "A":
          pacman.nextDir = cloneDir(DIR.LEFT);
          break;
        case "ArrowRight":
        case "d":
        case "D":
          pacman.nextDir = cloneDir(DIR.RIGHT);
          break;
        case "ArrowUp":
        case "w":
        case "W":
          pacman.nextDir = cloneDir(DIR.UP);
          break;
        case "ArrowDown":
        case "s":
        case "S":
          pacman.nextDir = cloneDir(DIR.DOWN);
          break;
      }
    });

    // -----------------------
    // Main loop
    // -----------------------
    let lastTime = 0;

    function update(time) {
      if (!lastTime) lastTime = time;
      const dt = (time - lastTime) / 1000;
      lastTime = time;

      if (!gameOver) {
        elapsedTime += dt;
        movePacman(dt);
        ghosts.forEach(g => moveGhost(g, dt, elapsedTime));
        handlePelletEating();
        handleGhostCollisions();

        // power mode timer
        if (powerTimer > 0) {
          powerTimer -= dt;
          if (powerTimer <= 0) {
            powerTimer = 0;
            ghosts.forEach(g => {
              if (g.mode === "frightened") g.mode = "chase";
            });
            ghostEatMultiplier = 1;
          } else {
            // knipperen in laatste 3 sec
            const flashing = powerTimer < 3;
            if (flashing) {
              ghosts.forEach(g => {
                if (g.mode === "frightened") {
                  g.frightenedFlash = !g.frightenedFlash;
                }
              });
            }
          }
        }
      }

      draw();

      if (!gameOver) {
        requestAnimationFrame(update);
      } else {
        drawGameOver();
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      drawMaze();
      drawPellets();
      drawPacman();
      ghosts.forEach(drawGhost);

      // HUD
      scoreEl.textContent = "Score: " + score;
      livesEl.textContent = "Lives: " + lives;
      timeEl.textContent = "Time: " + elapsedTime.toFixed(1) + "s";
    }

    function drawGameOver() {
      ctx.fillStyle = "rgba(0,0,0,0.7)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#ff0000";
      ctx.font = "32px Arial";
      ctx.textAlign = "center";
      ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 10);
      ctx.fillStyle = "#ffffff";
      ctx.font = "20px Arial";
      ctx.fillText("Final score: " + score, canvas.width / 2, canvas.height / 2 + 20);
    }

    // -----------------------
    // Init
    // -----------------------
    initLevelData();
    resetPacman();
    initGhosts();
    requestAnimationFrame(update);
  </script>
</body>
</html>
